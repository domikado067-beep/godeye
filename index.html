<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GODEYE TERMINAL v9.5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&display=swap');
        body { font-family: 'JetBrains+Mono', monospace; background: #000; color: #475569; margin: 0; padding: 15px; }
        .glass-panel { background: rgba(10, 10, 15, 0.98); border: 1px solid #1e293b; border-radius: 1.5rem; }
        .input-dark { background: #050505; border: 1px solid #1e293b; color: #fff; border-radius: 0.75rem; }
        .input-dark:focus { border-color: #3b82f6; outline: none; box-shadow: 0 0 15px rgba(59, 130, 246, 0.1); }
        .btn-glow { background: #2563eb; color: #fff; font-weight: 800; transition: 0.3s; box-shadow: 0 4px 15px rgba(37, 99, 235, 0.2); }
        .btn-glow:active { transform: scale(0.96); opacity: 0.8; }
        .status-pulse { height: 8px; width: 8px; background: #22c55e; border-radius: 50%; display: inline-block; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-thumb { background: #1e293b; }
    </style>
</head>
<body class="pb-20">

    <div class="max-w-xl mx-auto">
        <header class="flex justify-between items-center mb-8 px-2">
            <div>
                <h1 class="text-2xl font-black text-blue-500 italic tracking-tighter italic">GODEYE v9.5</h1>
                <p class="text-[9px] tracking-[0.3em] uppercase opacity-40 font-bold">Hybrid Stable Protocol</p>
            </div>
            <div class="text-right">
                <span class="status-pulse"></span>
                <span class="text-[10px] font-bold text-blue-600 uppercase">Engine_Standby</span>
            </div>
        </header>

        <div class="space-y-5">
            <div class="space-y-2">
                <label class="text-[10px] font-bold text-slate-500 uppercase ml-1">Google AI API Key</label>
                <input type="password" id="api-key" placeholder="Paste Key dari AI Studio..." class="w-full p-4 input-dark text-xs">
            </div>

            <div id="drop-zone" class="relative border-2 border-dashed border-slate-900 rounded-2xl p-10 text-center bg-slate-950/40 hover:bg-slate-900 transition-all cursor-pointer">
                <input type="file" id="file-input" class="hidden" accept="image/*">
                <canvas id="comp-canvas" class="hidden"></canvas>
                <img id="preview" class="hidden mx-auto max-h-60 rounded-xl mb-4 shadow-2xl border border-slate-800">
                <div id="upload-hint">
                    <div class="text-3xl mb-2 opacity-20">📸</div>
                    <p class="text-[10px] font-bold text-slate-500 uppercase">Input Screenshot Chart</p>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <input type="text" id="pair" placeholder="Pair (BTCUSDT)" class="p-4 input-dark text-xs uppercase font-bold outline-none">
                <select id="bias" class="p-4 input-dark text-xs font-bold outline-none">
                    <option value="BUY/LONG">BUY/LONG</option>
                    <option value="SELL/SHORT">SELL/SHORT</option>
                </select>
            </div>

            <button onclick="executeHybrid()" id="btn-run" class="btn-glow w-full py-5 rounded-2xl text-[11px] uppercase tracking-[0.3em] active:scale-95 transition-all">
                Execute Scanning
            </button>

            <div id="result-box" class="hidden glass-panel p-6 border-l-4 border-l-blue-600 animate-in fade-in duration-500">
                <div class="flex justify-between items-center mb-4 border-b border-slate-900 pb-2">
                    <span class="text-[10px] font-bold text-blue-500 uppercase italic">Analysis_Report</span>
                    <span id="time-stamp" class="text-[9px] opacity-20 font-bold italic"></span>
                </div>
                <div id="ai-output" class="text-slate-200 leading-relaxed space-y-4 text-sm font-sans">
                    </div>
            </div>
        </div>
    </div>

    <script>
        let GLOBAL_B64 = "";

        // Image Selection & Compression
        document.getElementById('drop-zone').onclick = () => document.getElementById('file-input').click();
        document.getElementById('file-input').onchange = (e) => {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.getElementById('comp-canvas');
                    const MAX_W = 1000;
                    let w = img.width, h = img.height;
                    if(w > MAX_W) { h *= MAX_W / w; w = MAX_W; }
                    canvas.width = w; canvas.height = h;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, w, h);
                    const comp = canvas.toDataURL('image/jpeg', 0.8);
                    GLOBAL_B64 = comp.split(',')[1];
                    document.getElementById('preview').src = comp;
                    document.getElementById('preview').classList.remove('hidden');
                    document.getElementById('upload-hint').classList.add('hidden');
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        };

        async function executeHybrid() {
            const key = document.getElementById('api-key').value.trim();
            const pair = document.getElementById('pair').value || "Asset";
            const bias = document.getElementById('bias').value;

            if(!key || !GLOBAL_B64) return alert("API Key atau Foto Chart Kosong!");

            const btn = document.getElementById('btn-run');
            const out = document.getElementById('ai-output');
            btn.innerText = "ENGAGING HYBRID v1..."; btn.disabled = true;
            document.getElementById('result-box').classList.remove('hidden');
            out.innerHTML = `<p class="animate-pulse text-blue-400 italic font-bold">Mencari celah koneksi v1-stable... Mohon tunggu.</p>`;

            const prompt = `Lo adalah Master Trader. Analisa chart ${pair} ini. 
            Cari: 1. Struktur (BOS/CHOCH) 2. Area Supply/Demand 3. Rencana Trade (Entry, SL, TP). 
            Gunakan gaya bahasa lo-gue Jakarta yang pinter tapi ketus. Bias trade: ${bias}.`;

            // FIX: Coba jalur v1 dulu, kalau gagal dia bakal nangkep error-nya
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: prompt },
                                { inline_data: { mime_type: "image/jpeg", data: GLOBAL_B64 } }
                            ]
                        }]
                    })
                });

                const data = await response.json();

                if (data.error) {
                    // Jika v1 gagal, kasih info detail
                    throw new Error(`${data.error.code}: ${data.error.message}`);
                }

                const resText = data.candidates[0].content.parts[0].text;
                out.innerHTML = `
                    <div class="p-3 bg-blue-500/5 border-l-2 border-blue-500 mb-4 italic text-blue-400 text-[11px]">
                        "Market bukan tempat buat orang baperan. Ikutin struktur atau ludes."
                    </div>
                    ${resText.replace(/\n/g, '<br>')}
                `;
                document.getElementById('time-stamp').innerText = new Date().toLocaleTimeString();

            } catch (err) {
                out.innerHTML = `<div class="p-4 bg-red-900/10 border border-red-900/50 rounded-xl text-red-500 text-[11px]">
                    <b class="block mb-2 uppercase">HYBRID_ENGINE_FAILURE</b>
                    Error: ${err.message}<br><br>
                    <p class="opacity-70 italic text-[10px]">
                    1. Pastiin API Key lo valid (cek di Google AI Studio).<br>
                    2. Kalo error 404, artinya region lo harus pake v1beta. Ganti teks '/v1/' di kode jadi '/v1beta/'.<br>
                    3. Kalo error 403, berarti API Key lo belom aktif buat Gemini 1.5 Flash.</p>
                </div>`;
            } finally {
                btn.innerText = "Execute Scanning"; btn.disabled = false;
            }
        }
    </script>
</body>
</html>
