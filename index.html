<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GODEYE v9.0 | Direct Protocol</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&display=swap');
        body { font-family: 'JetBrains+Mono', monospace; background: #000; color: #475569; }
        .glass { background: rgba(15, 23, 42, 0.9); border: 1px solid #1e293b; border-radius: 1rem; }
        input, select { background: #050505 !important; border: 1px solid #1e293b !important; color: #fff !important; font-size: 11px !important; }
        .tab-active { color: #3b82f6; border-bottom: 2px solid #3b82f6; }
        .btn-active:active { transform: scale(0.97); }
    </style>
</head>
<body class="p-4">
    <div class="max-w-xl mx-auto">
        <header class="mb-6 flex justify-between items-center">
            <div>
                <h1 class="text-xl font-black text-blue-500 italic">GODEYE v9.0</h1>
                <p class="text-[8px] tracking-widest opacity-40 uppercase">Direct Engine - No Proxy Mode</p>
            </div>
            <div class="h-1.5 w-1.5 rounded-full bg-blue-500 animate-pulse"></div>
        </header>

        <div class="space-y-4">
            <div class="space-y-1">
                <label class="text-[9px] font-bold text-slate-500 ml-1 uppercase">Google Gemini API Key</label>
                <input type="password" id="api-key" placeholder="Paste Key dari AI Studio" class="w-full p-4 rounded-xl outline-none focus:border-blue-600">
            </div>

            <div id="drop-zone" class="border-2 border-dashed border-slate-900 rounded-2xl p-8 text-center bg-slate-950/50 cursor-pointer">
                <input type="file" id="file-input" class="hidden" accept="image/*">
                <canvas id="compress-canvas" class="hidden"></canvas>
                <img id="preview" class="hidden mx-auto max-h-56 rounded-lg mb-4 shadow-xl border border-slate-800">
                <p id="hint" class="text-[10px] font-bold opacity-30 uppercase">Upload Chart (Auto-Resize Active)</p>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <input type="text" id="pair" placeholder="Pair (XAUUSD)" class="p-4 rounded-xl outline-none uppercase font-bold">
                <select id="bias" class="p-4 rounded-xl outline-none font-bold">
                    <option value="BUY/LONG">BUY/LONG</option>
                    <option value="SELL/SHORT">SELL/SHORT</option>
                </select>
            </div>

            <button onclick="runDirect()" id="btn-run" class="btn-active w-full py-5 bg-blue-600 hover:bg-blue-500 text-white font-black rounded-2xl text-[11px] uppercase tracking-widest transition-all">
                Analyze Market Now
            </button>

            <div id="result" class="hidden glass p-5 space-y-4 border-l-2 border-blue-600">
                <div id="output" class="text-[12px] text-slate-200 leading-relaxed whitespace-pre-wrap font-sans"></div>
            </div>
        </div>
    </div>

    <script>
        let FINAL_B64 = "";

        document.getElementById('drop-zone').onclick = () => document.getElementById('file-input').click();
        
        document.getElementById('file-input').onchange = function(e) {
            const file = e.target.files[0];
            if(!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    // RESIZE LOGIC: Maksimal lebar 800px biar enteng dikirim
                    const canvas = document.getElementById('compress-canvas');
                    const MAX_WIDTH = 800;
                    let width = img.width;
                    let height = img.height;

                    if (width > MAX_WIDTH) {
                        height *= MAX_WIDTH / width;
                        width = MAX_WIDTH;
                    }

                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    // Kompres ke JPEG kualitas 0.7
                    FINAL_B64 = canvas.toDataURL('image/jpeg', 0.7).split(',')[1];
                    
                    document.getElementById('preview').src = canvas.toDataURL('image/jpeg');
                    document.getElementById('preview').classList.remove('hidden');
                    document.getElementById('hint').classList.add('hidden');
                }
                img.src = event.target.result;
            }
            reader.readAsDataURL(file);
        };

        async function runDirect() {
            const key = document.getElementById('api-key').value.trim();
            const pair = document.getElementById('pair').value || "Asset";
            const bias = document.getElementById('bias').value;

            if(!key || !FINAL_B64) return alert("Key atau Gambar belum siap!");

            const btn = document.getElementById('btn-run');
            const out = document.getElementById('output');
            btn.innerText = "ANALYZING..."; btn.disabled = true;
            document.getElementById('result').classList.remove('hidden');
            out.innerText = "Processing via Google Gemini Flash... Mohon tunggu.";

            const prompt = `Analisa chart ${pair} ini dengan gaya lo-gue Jakarta yang ketus tapi pinter. Cari Market Structure, SNR area, dan kasih Trading Plan (Entry/SL/TP). Bias gue: ${bias}.`;

            try {
                // Kita coba Direct tembak ke Google tanpa proxy
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: prompt },
                                { inline_data: { mime_type: "image/jpeg", data: FINAL_B64 } }
                            ]
                        }]
                    })
                });

                const data = await response.json();

                if (data.error) {
                    throw new Error(data.error.message || JSON.stringify(data.error));
                }

                const resultText = data.candidates[0].content.parts[0].text;
                out.innerHTML = `<span class="text-blue-500 font-bold underline mb-2 block">AI ANALYSIS:</span>` + resultText.replace(/\n/g, '<br>');

            } catch (err) {
                out.innerHTML = `<span class="text-red-500 font-bold">ERROR CRITICAL:</span><br>${err.message}<br><br><p class="text-[9px] opacity-50 italic">Kalo masih gagal, ini fix ISP lo ngeblokir server Google API. Coba ganti koneksi ke WiFi lain atau pake Cloudflare 1.1.1.1.</p>`;
            } finally {
                btn.innerText = "Analyze Market Now"; btn.disabled = false;
            }
        }
    </script>
</body>
</html>
