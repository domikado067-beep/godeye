<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GODEYE v9.2 | Stable Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&display=swap');
        body { font-family: 'JetBrains+Mono', monospace; background: #000; color: #64748b; margin: 0; padding: 15px; }
        .terminal-card { background: rgba(10, 10, 15, 0.95); border: 1px solid #1e293b; border-radius: 1.25rem; }
        .input-glow { background: #050505; border: 1px solid #1e293b; color: #fff; transition: 0.3s; }
        .input-glow:focus { border-color: #3b82f6; box-shadow: 0 0 10px rgba(59, 130, 246, 0.1); outline: none; }
        .status-dot { height: 6px; width: 6px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .btn-active:active { transform: scale(0.96); opacity: 0.8; }
        ::-webkit-scrollbar { width: 2px; }
        ::-webkit-scrollbar-thumb { background: #1e293b; }
    </style>
</head>
<body class="pb-24 text-[12px]">

    <div class="max-w-xl mx-auto">
        <header class="flex justify-between items-center mb-8 px-2">
            <div>
                <h1 class="text-xl font-black text-blue-500 italic tracking-tighter">GODEYE v9.2</h1>
                <p class="text-[8px] tracking-[0.4em] uppercase opacity-40 font-bold text-slate-400 text-xs">V1 STABLE PROTOCOL</p>
            </div>
            <div class="text-right">
                <span class="status-dot bg-blue-600 animate-pulse"></span>
                <span class="text-[9px] font-bold text-blue-600 uppercase">System_Active</span>
            </div>
        </header>

        <div class="space-y-4">
            <div class="space-y-1">
                <label class="text-[10px] font-bold text-slate-500 ml-1 uppercase tracking-widest text-xs mb-3">Google Gemini API Key</label>
                <input type="password" id="api-key" placeholder="Paste key dari AI Studio..." 
                       class="w-full p-4 rounded-xl input-glow outline-none">
            </div>

            <div id="drop-zone" class="relative border-2 border-dashed border-slate-900 rounded-2xl p-8 text-center bg-slate-950/40 hover:bg-slate-900 transition-all cursor-pointer">
                <input type="file" id="file-input" class="hidden" accept="image/*">
                <canvas id="compress-canvas" class="hidden"></canvas>
                <img id="preview" class="hidden mx-auto max-h-60 rounded-xl mb-4 shadow-2xl border border-slate-800">
                <div id="upload-hint">
                    <div class="text-2xl mb-2 opacity-20">📈</div>
                    <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest text-xs">Tap to Upload Screenshot</p>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <input type="text" id="pair" placeholder="Pair (XAUUSD)" class="p-4 rounded-xl input-glow outline-none font-bold uppercase">
                <select id="bias" class="p-4 rounded-xl input-glow outline-none font-bold">
                    <option value="BUY/LONG">BUY/LONG</option>
                    <option value="SELL/SHORT">SELL/SHORT</option>
                </select>
            </div>

            <button onclick="executeScan()" id="main-btn" class="btn-active w-full py-5 bg-blue-600 hover:bg-blue-500 text-white font-black rounded-2xl text-[11px] uppercase tracking-[0.3em] shadow-lg shadow-blue-900/20 transition-all">
                Run Analytical Engine
            </button>

            <div id="result-terminal" class="hidden terminal-card p-6 border-l-4 border-l-blue-600 animate-in fade-in duration-500">
                <div class="flex justify-between items-center mb-4 pb-2 border-b border-slate-900">
                    <span class="text-[10px] font-bold text-blue-500 uppercase">Intelligence_Report</span>
                    <span id="log-time" class="text-[9px] opacity-20 font-bold italic font-xs"></span>
                </div>
                <div id="ai-output" class="text-slate-200 leading-relaxed space-y-4 font-sans text-sm">
                    </div>
                <button onclick="saveToArchive()" class="w-full mt-6 py-3 border border-slate-800 rounded-xl text-[10px] font-black uppercase text-slate-600 tracking-widest hover:bg-slate-900">
                    Commit to Journal
                </button>
            </div>
        </div>
    </div>

    <script>
        let FINAL_BASE64 = "";

        // Handle Image Selection & Compression
        document.getElementById('drop-zone').onclick = () => document.getElementById('file-input').click();
        
        document.getElementById('file-input').onchange = (e) => {
            const file = e.target.files[0];
            if(!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.getElementById('compress-canvas');
                    const MAX_SIZE = 1000; // Resize ke 1000px biar detail dapet tapi file kecil
                    let width = img.width;
                    let height = img.height;

                    if (width > height) {
                        if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; }
                    } else {
                        if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; }
                    }

                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    // Compress JPEG 0.7 kualitas (sweet spot buat AI)
                    const compressedData = canvas.toDataURL('image/jpeg', 0.7);
                    FINAL_BASE64 = compressedData.split(',')[1];
                    
                    document.getElementById('preview').src = compressedData;
                    document.getElementById('preview').classList.remove('hidden');
                    document.getElementById('upload-hint').classList.add('hidden');
                }
                img.src = event.target.result;
            }
            reader.readAsDataURL(file);
        };

        // Main Engine Execution
        async function executeScan() {
            const key = document.getElementById('api-key').value.trim();
            const pair = document.getElementById('pair').value || "Asset";
            const bias = document.getElementById('bias').value;

            if(!key || !FINAL_BASE64) return alert("Error: API Key atau Foto Chart belum di-input!");

            const btn = document.getElementById('main-btn');
            const out = document.getElementById('ai-output');
            btn.innerText = "COGNITIVE SCANNING..."; btn.disabled = true;
            document.getElementById('result-terminal').classList.remove('hidden');
            out.innerHTML = `<p class="animate-pulse text-blue-400 italic">Membangun koneksi ke Google V1 Stable... Menganalisis struktur candlestick & SNR.</p>`;

            const promptText = `Lo adalah Master Institutional Trader. Analisa chart ${pair} ini secara mendalam. 
            Isi laporan wajib:
            1. Market Structure (BOS / CHOCH / Sideways).
            2. High Liquidity Zones & SNR Area.
            3. Detailed Trading Plan: Entry Zone, Stop Loss (Wajib), dan Take Profit.
            Gunakan gaya bahasa lo-gue Jakarta yang pinter, tajam, logis, tapi sedikit ketus. Bias trade gue sekarang: ${bias}.`;

            try {
                // Gunakan Jalur V1 Stable
                const response = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: promptText },
                                { inline_data: { mime_type: "image/jpeg", data: FINAL_BASE64 } }
                            ]
                        }]
                    })
                });

                const data = await response.json();

                if (data.error) {
                    throw new Error(`${data.error.code}: ${data.error.message}`);
                }

                if (!data.candidates || data.candidates.length === 0) {
                    throw new Error("AI gak ngasih respon (Empty Response). Cek koneksi lo.");
                }

                const result = data.candidates[0].content.parts[0].text;
                out.innerHTML = `
                    <div class="p-3 bg-blue-500/5 border-l-2 border-blue-500 mb-4 italic text-blue-500/80 text-[11px]">
                        "Jangan jadi exit liquidity buat paus. Pake logika, jangan pake emosi."
                    </div>
                    ${result.replace(/\n/g, '<br>')}
                `;
                document.getElementById('log-time').innerText = new Date().toLocaleTimeString();
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });

            } catch (err) {
                out.innerHTML = `<div class="p-4 bg-red-950/20 border border-red-900/40 rounded-xl text-red-500 italic">
                    <b class="block mb-2 uppercase tracking-widest font-black">Scanning_Failure</b>
                    Pesan: ${err.message}<br><br>
                    <p class="text-[9px] opacity-70">Saran: Kalo dapet '403', cek lagi API Key lo di Google AI Studio. Kalo 'Failed to Fetch', ISP lo nge-blokir Google API, solusinya pake VPN (Cloudflare 1.1.1.1).</p>
                </div>`;
            } finally {
                btn.innerText = "Run Analytical Engine"; btn.disabled = false;
            }
        }

        // Journaling System (Save ke LocalStorage)
        function saveToArchive() {
            const pair = document.getElementById('pair').value || "X";
            const logs = JSON.parse(localStorage.getItem('godeye_v92_logs') || '[]');
            logs.unshift({
                id: Date.now(),
                pair: pair,
                date: new Date().toLocaleString(),
                img: document.getElementById('preview').src
            });
            localStorage.setItem('godeye_v92_logs', JSON.stringify(logs));
            alert("Sinyal tersimpan di memory browser.");
        }
    </script>
</body>
</html>
